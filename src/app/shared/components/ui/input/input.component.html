<div class="space-y-1.5">
  @if (label) {
    <label [for]="id" class="block text-sm font-medium text-neutral-700">
      {{ label }}
      @if (required) {
        <span class="text-danger-500">*</span>
      }
    </label>
  }

  <div class="relative">
    @if (icon) {
      <div class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400">
        <ng-content select="[slot=icon]"></ng-content>
      </div>
    }

    <input
      [id]="id"
      [type]="type"
      [placeholder]="placeholder"
      [disabled]="disabled"
      [required]="required"
      [value]="currentValue()"
      (input)="onInput($event)"
      (blur)="onTouched()"
      [class]="inputClasses()"
    />

    @if (error && touched) {
      <div class="absolute right-3 top-1/2 -translate-y-1/2 text-danger-500">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
      </div>
    }
  </div>

  @if (hint && !error) {
    <p class="text-xs text-neutral-500">{{ hint }}</p>
  }

  @if (error && touched) {
    <p class="text-xs text-danger-600 animate-slide-down">{{ error }}</p>
  }
</div>
