<div class="space-y-3">
  <label class="form-label">{{ label() }}</label>

  <!-- Preview -->
  @if (currentPreview()) {
    <!-- Large variant (settings) -->
    @if (variant() === 'large') {
      <div class="mb-6 relative inline-block group">
        <div class="relative">
          <img
            [src]="currentPreview()!"
            alt="Profile preview"
            class="w-40 h-40 rounded-2xl object-cover border border-separator shadow-sm"
          />
          <div class="absolute inset-0 bg-black/20 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-200"></div>
        </div>
        <button
          type="button"
          (click)="remove()"
          class="absolute -top-2 -right-2 w-8 h-8 bg-system-red text-white rounded-full hover:scale-110 transition-transform duration-200 shadow-sm flex items-center justify-center"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    } @else {
      <!-- Compact variant (onboarding) -->
      <div class="flex items-center gap-6">
        <div class="relative group">
          <div class="w-20 h-20 rounded-2xl overflow-hidden ring-1 ring-separator shadow-sm">
            <img
              [src]="currentPreview()!"
              alt="Profile preview"
              class="w-full h-full object-cover"
            />
          </div>
          <button
            type="button"
            (click)="remove()"
            class="absolute -top-2 -right-2 w-6 h-6 bg-system-red rounded-full flex items-center justify-center text-white text-xs hover:bg-red-600 transition-colors shadow-sm"
          >
            ✕
          </button>
        </div>

        <div class="flex flex-col gap-2">
          <ng-container *ngTemplateOutlet="uploadBtn" />
          <p class="text-xs text-content-tertiary">JPG, PNG or GIF · Auto-compressed</p>
        </div>
      </div>
    }
  } @else {
    <!-- No image placeholder -->
    @if (variant() === 'large') {
      <div class="mb-6 w-40 h-40 rounded-2xl bg-surface-raised border-2 border-dashed border-separator flex items-center justify-center group hover:border-accent/40 hover:bg-surface-elevated transition-all duration-200">
        <svg class="w-16 h-16 text-content-tertiary/40 group-hover:text-accent/40 transition-colors duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>
    } @else {
      <div class="flex items-center gap-6">
        <div class="w-20 h-20 rounded-2xl bg-surface-raised border border-separator flex items-center justify-center">
          <svg class="w-8 h-8 text-content-tertiary/40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div>

        <div class="flex flex-col gap-2">
          <ng-container *ngTemplateOutlet="uploadBtn" />
          <p class="text-xs text-content-tertiary">JPG, PNG or GIF · Auto-compressed</p>
        </div>
      </div>
    }
  }

  <!-- Upload controls for large variant -->
  @if (variant() === 'large') {
    <div class="flex items-center gap-4">
      <ng-container *ngTemplateOutlet="uploadBtn" />
      @if (currentPreview()) {
        <button
          type="button"
          (click)="remove()"
          class="btn-ghost btn-md text-system-red hover:bg-system-red/10"
        >Remove</button>
      }
    </div>
    <p class="text-xs text-content-tertiary mt-3">JPG, PNG or GIF. Any size — auto-compressed.</p>
  }

  <!-- Hidden file input -->
  <input
    [id]="inputId"
    type="file"
    accept="image/*"
    (change)="onFileSelected($event)"
    [disabled]="uploading()"
    class="hidden"
  />
</div>

<!-- Reusable upload button template -->
<ng-template #uploadBtn>
  <label
    [for]="inputId"
    class="btn-secondary cursor-pointer inline-flex items-center"
    [ngClass]="variant() === 'large' ? 'btn-md gap-2' : 'btn-sm gap-1.5 text-sm'"
    [class.opacity-50]="uploading()"
    [class.cursor-not-allowed]="uploading()"
  >
    @if (uploading()) {
      <svg [class]="variant() === 'large' ? 'animate-spin h-4 w-4 text-accent' : 'animate-spin h-3.5 w-3.5'" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <span>Uploading…</span>
    } @else {
      <svg [class]="variant() === 'large' ? 'w-4 h-4' : 'w-3.5 h-3.5'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
      <span>{{ currentPreview() ? 'Change Photo' : 'Upload Photo' }}</span>
    }
  </label>
</ng-template>
