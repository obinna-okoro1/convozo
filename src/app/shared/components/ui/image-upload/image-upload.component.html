<div class="space-y-3">
  <label class="block text-sm font-bold text-white">{{ label() }}</label>

  <!-- Preview -->
  @if (currentPreview()) {
    <!-- Large variant (settings) -->
    @if (variant() === 'large') {
      <div class="mb-6 relative inline-block animate-scale-in group">
        <div class="relative">
          <img
            [src]="currentPreview()!"
            alt="Profile preview"
            class="w-40 h-40 rounded-2xl object-cover border-2 border-white/20 shadow-lg shadow-purple-500/20"
          />
          <div class="absolute inset-0 bg-gradient-to-br from-purple-600/20 to-pink-600/20 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
        </div>
        <button
          type="button"
          (click)="remove()"
          class="absolute -top-3 -right-3 w-10 h-10 bg-gradient-to-br from-red-500 to-orange-500 text-white rounded-xl hover:scale-110 transition-all duration-300 shadow-lg shadow-red-500/50 flex items-center justify-center font-bold"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    } @else {
      <!-- Compact variant (onboarding) -->
      <div class="flex items-center gap-6">
        <div class="relative group">
          <div class="w-20 h-20 rounded-2xl overflow-hidden ring-2 ring-purple-500/50 shadow-lg shadow-purple-500/20">
            <img
              [src]="currentPreview()!"
              alt="Profile preview"
              class="w-full h-full object-cover"
            />
          </div>
          <button
            type="button"
            (click)="remove()"
            class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 rounded-full flex items-center justify-center text-white text-xs hover:bg-red-600 transition-colors shadow-lg"
          >
            ✕
          </button>
        </div>

        <!-- Upload button (compact, beside preview) -->
        <div class="flex flex-col gap-2">
          <ng-container *ngTemplateOutlet="uploadBtn" />
          <p class="text-xs text-white/40">JPG, PNG or GIF · Auto-compressed</p>
        </div>
      </div>
    }
  } @else {
    <!-- No image placeholder -->
    @if (variant() === 'large') {
      <div class="mb-6 w-40 h-40 rounded-2xl bg-white/5 border-2 border-dashed border-white/20 flex items-center justify-center group hover:border-purple-500/50 hover:bg-white/10 transition-all duration-300">
        <svg class="w-20 h-20 text-white/30 group-hover:text-purple-400 transition-colors duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>
    } @else {
      <div class="flex items-center gap-6">
        <div class="w-20 h-20 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center">
          <svg class="w-8 h-8 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div>

        <!-- Upload button (compact, beside placeholder) -->
        <div class="flex flex-col gap-2">
          <ng-container *ngTemplateOutlet="uploadBtn" />
          <p class="text-xs text-white/40">JPG, PNG or GIF · Auto-compressed</p>
        </div>
      </div>
    }
  }

  <!-- Upload controls for large variant (below the preview / placeholder) -->
  @if (variant() === 'large') {
    <div class="flex items-center gap-4">
      <ng-container *ngTemplateOutlet="uploadBtn" />
      @if (currentPreview()) {
        <button
          type="button"
          (click)="remove()"
          class="px-6 py-3 rounded-xl font-semibold text-red-400 hover:text-red-300 hover:bg-red-500/10 transition-all duration-300"
        >
          Remove
        </button>
      }
    </div>
    <p class="text-xs text-white/50 mt-3">JPG, PNG or GIF. Any size — auto-compressed.</p>
  }

  <!-- Hidden file input -->
  <input
    [id]="inputId"
    type="file"
    accept="image/*"
    (change)="onFileSelected($event)"
    [disabled]="uploading()"
    class="hidden"
  />
</div>

<!-- Reusable upload button template -->
<ng-template #uploadBtn>
  <label
    [for]="inputId"
    class="inline-flex items-center gap-2 bg-white/10 border border-white/20 rounded-xl text-white font-semibold cursor-pointer hover:bg-white/20 transition-all duration-300 shadow-lg hover:shadow-xl"
    [class]="variant() === 'large' ? 'px-6 py-3 gap-3' : 'px-5 py-3 text-sm gap-2'"
    [class.opacity-50]="uploading()"
    [class.cursor-not-allowed]="uploading()"
  >
    @if (uploading()) {
      <svg [class]="variant() === 'large' ? 'animate-spin h-5 w-5 text-purple-400' : 'animate-spin h-4 w-4'" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
      </svg>
      <span>Uploading...</span>
    } @else {
      <svg [class]="variant() === 'large' ? 'w-5 h-5' : 'w-4 h-4'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
      </svg>
      <span>{{ currentPreview() ? 'Change Photo' : 'Upload Photo' }}</span>
    }
  </label>
</ng-template>
