<div
  class="fixed top-4 right-4 z-[9999] flex flex-col gap-3 max-w-sm w-full pointer-events-none"
  role="status"
  aria-live="polite"
  aria-atomic="true"
>
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      [class]="'pointer-events-auto animate-slide-down backdrop-blur-2xl border rounded-2xl p-4 shadow-2xl flex items-start gap-3 transition-all duration-300 ' + getToastClasses(toast)"
    >
      <div
        [class]="'flex-shrink-0 w-8 h-8 rounded-lg flex items-center justify-center ' + getIconBgClasses(toast)"
      >
        @switch (toast.type) {
          @case ('success') {
            <svg
              class="w-5 h-5 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M5 13l4 4L19 7"
              />
            </svg>
          }
          @case ('error') {
            <svg
              class="w-5 h-5 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M6 18L18 6M6 6l12 12"
              />
            </svg>
          }
          @case ('warning') {
            <svg
              class="w-5 h-5 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
          }
          @case ('info') {
            <svg
              class="w-5 h-5 text-white"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              />
            </svg>
          }
        }
      </div>
      <p class="text-sm font-medium text-white flex-1">{{ toast.message }}</p>
      <button
        (click)="toastService.dismiss(toast.id)"
        class="flex-shrink-0 text-white/50 hover:text-white transition-colors"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>
  }
</div>
