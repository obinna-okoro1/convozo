<div class="min-h-screen bg-surface relative overflow-hidden">

  <!-- Ambient blobs for glass depth -->
  <div class="absolute inset-0 pointer-events-none" aria-hidden="true">
    <div style="position:absolute;top:-10rem;right:-8rem;width:40rem;height:40rem;background:radial-gradient(ellipse at 100% 0%,rgba(124,58,237,0.1) 0%,transparent 65%)"></div>
    <div style="position:absolute;bottom:10%;left:-8rem;width:34rem;height:34rem;background:radial-gradient(ellipse at 0% 50%,rgba(236,72,153,0.08) 0%,transparent 65%)"></div>
  </div>

  @if (state.loading()) {
    <div class="flex items-center justify-center min-h-screen">
      <div class="text-center">
        <div class="w-10 h-10 rounded-full border-2 border-surface-border border-t-accent animate-spin mx-auto mb-4"></div>
        <p class="text-content-secondary text-sm">Loading settings...</p>
      </div>
    </div>
  } @else {

    <!-- Navigation Bar -->
    <header class="sticky top-0 z-20 nav-bar">
      <div class="max-w-7xl mx-auto px-4 sm:px-6">
        <div class="h-14 flex items-center gap-3">
          <button
            (click)="state.goToProfile()"
            class="w-9 h-9 rounded-xl flex items-center justify-center bg-surface-raised text-content-secondary hover:text-content hover:bg-surface-overlay transition-colors duration-150"
            aria-label="Back to dashboard"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
          </button>
          <h1 class="text-[0.9375rem] font-semibold text-content">Settings</h1>
        </div>
      </div>
    </header>

    <!-- Feedback -->
    @if (state.success()) {
      <div class="px-4 sm:px-6 pt-4">
        <div class="max-w-7xl mx-auto">
          <div class="alert-success animate-slide-down">
            <svg class="w-4 h-4 text-[#1a9e3f] flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
            </svg>
            <p class="text-sm text-content">Changes saved</p>
          </div>
        </div>
      </div>
    }

    @if (state.error()) {
      <div class="px-4 sm:px-6 pt-4">
        <div class="max-w-7xl mx-auto">
          <div class="alert-error animate-slide-down">
            <svg class="w-4 h-4 text-[#d70015] flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
            <p class="text-sm text-[#d70015]">{{ state.error() }}</p>
          </div>
        </div>
      </div>
    }

    <!-- Tabs -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
      <app-settings-tabs />
    </div>

    <!-- Routed Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 pb-16">
      <router-outlet />
    </main>
  }
</div>
