<div class="min-h-screen relative overflow-hidden">
  <!-- Animated Background -->
  <app-animated-background />

  @if (state.loading()) {
    <div class="flex items-center justify-center min-h-screen relative z-10">
      <div class="text-center animate-fade-in">
        <div class="w-20 h-20 mx-auto mb-6 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center shadow-lg shadow-purple-500/50 animate-pulse-slow">
          <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </div>
        <p class="text-xl font-semibold text-white mb-2">Loading Settings</p>
        <p class="text-slate-400">Please wait...</p>
      </div>
    </div>
  } @else {
    <!-- Header -->
    <header class="sticky top-0 z-50 bg-white/5 backdrop-blur-2xl border-b border-white/10">
      <div class="container mx-auto px-3 sm:px-4 py-4 sm:py-6">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3 sm:gap-4">
            <button (click)="state.goToDashboard()" class="w-10 h-10 sm:w-12 sm:h-12 bg-white/5 active:bg-white/10 sm:hover:bg-white/10 border border-white/10 backdrop-blur-xl rounded-lg sm:rounded-xl flex items-center justify-center transition-all duration-300 active:scale-95 sm:hover:scale-105">
              <svg class="w-5 h-5 sm:w-6 sm:h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
              </svg>
            </button>
            <div class="min-w-0">
              <h1 class="text-xl sm:text-2xl lg:text-3xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent truncate">Settings</h1>
              <p class="text-slate-400 text-xs sm:text-sm mt-0.5 sm:mt-1 hidden sm:block">Manage your profile, monetization, and payments</p>
            </div>
          </div>
        </div>
      </div>
    </header>

    <div class="container mx-auto px-3 sm:px-4 py-4 sm:py-6 lg:py-8 max-w-4xl relative z-10">
      <!-- Success Message -->
      @if (state.success()) {
        <div class="mb-6 p-6 bg-gradient-to-r from-emerald-500/20 to-green-500/20 border border-emerald-500/30 backdrop-blur-2xl rounded-2xl animate-slide-down shadow-lg shadow-emerald-500/20">
          <div class="flex gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-emerald-500 to-green-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/50 flex-shrink-0">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
              </svg>
            </div>
            <div class="flex-1">
              <p class="text-lg font-bold text-white mb-1">✨ Success!</p>
              <p class="text-emerald-200">Settings saved successfully!</p>
            </div>
          </div>
        </div>
      }

      <!-- Error Message -->
      @if (state.error()) {
        <div class="mb-6 p-6 bg-gradient-to-r from-red-500/20 to-orange-500/20 border border-red-500/30 backdrop-blur-2xl rounded-2xl animate-slide-down shadow-lg shadow-red-500/20">
          <div class="flex gap-4">
            <div class="w-12 h-12 bg-gradient-to-br from-red-500 to-orange-500 rounded-xl flex items-center justify-center shadow-lg shadow-red-500/50 flex-shrink-0">
              <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </div>
            <div class="flex-1">
              <p class="text-lg font-bold text-white mb-1">⚠️ Error</p>
              <p class="text-red-200">{{ state.error() }}</p>
            </div>
          </div>
        </div>
      }

      <!-- Tabs -->
      <app-settings-tabs />

      <!-- Routed View Content -->
      <router-outlet />
    </div>
  }
</div>
