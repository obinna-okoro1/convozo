@if (tabs().length > 1) {
<div class="flex gap-1 p-1.5 mt-5 mb-5 rounded-2xl glass-panel overflow-x-auto scrollbar-hide">
  @for (tab of tabs(); track tab.path) {
    <a
      [routerLink]="tab.path"
      routerLinkActive
      #rla="routerLinkActive"
      class="flex items-center justify-center gap-1.5 px-4 py-2.5 rounded-xl text-xs sm:text-sm font-bold whitespace-nowrap flex-shrink-0 transition-all duration-300 relative overflow-hidden"
      [class]="rla.isActive ? 'text-white shadow-lg' : 'text-content-secondary hover:text-content hover:bg-white/20'"
      [style]="rla.isActive ? 'background:linear-gradient(135deg,rgba(124,58,237,0.85),rgba(147,51,234,0.85),rgba(236,72,153,0.85));backdrop-filter:saturate(200%) blur(1rem);-webkit-backdrop-filter:saturate(200%) blur(1rem);border:1px solid rgba(255,255,255,0.28);box-shadow:0 0.25rem 1rem rgba(124,58,237,0.32),inset 0 1px 0 rgba(255,255,255,0.22)' : ''"
    >
      @if (rla.isActive) {
        <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent animate-shine-sweep pointer-events-none"></div>
      }
      <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="tab.icon" />
      </svg>
      <span class="hidden sm:inline">{{ tab.label }}</span>
      <span class="sm:hidden">{{ tab.mobileLabel }}</span>
      @if (tab.badgeCount && tab.badgeCount() > 0) {
        <span class="min-w-[1.25rem] h-5 px-1.5 flex items-center justify-center text-xs font-bold rounded-full border"
              [class]="rla.isActive ? 'bg-white/25 text-white border-white/20' : tab.badgeColor">
          {{ tab.badgeCount() }}
        </span>
      }
    </a>
  }
</div>
}
