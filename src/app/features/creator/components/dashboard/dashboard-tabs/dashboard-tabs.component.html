@if (tabs().length > 1) {
<div class="flex gap-2 sm:gap-3 mt-4 sm:mt-6 border-t border-white/10 pt-4 sm:pt-6 overflow-x-auto pb-1 -mb-1 scrollbar-hide">
  @for (tab of tabs(); track tab.path) {
    <a
      [routerLink]="tab.path"
      routerLinkActive="tab-active"
      #rla="routerLinkActive"
      [class]="rla.isActive
        ? 'px-4 sm:px-6 py-2 sm:py-3 text-xs sm:text-sm font-semibold rounded-lg sm:rounded-xl backdrop-blur-xl transition-all duration-300 active:scale-95 sm:hover:scale-105 flex items-center gap-1.5 sm:gap-2 whitespace-nowrap flex-shrink-0 bg-gradient-to-r from-purple-600 to-pink-600 text-white shadow-lg shadow-purple-500/50'
        : 'px-4 sm:px-6 py-2 sm:py-3 text-xs sm:text-sm font-semibold rounded-lg sm:rounded-xl backdrop-blur-xl transition-all duration-300 active:scale-95 sm:hover:scale-105 flex items-center gap-1.5 sm:gap-2 whitespace-nowrap flex-shrink-0 bg-white/5 text-slate-400 border border-white/10'"
    >
      <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="tab.icon" />
      </svg>
      <span class="hidden sm:inline">{{ tab.label }}</span>
      <span class="sm:hidden">{{ tab.mobileLabel }}</span>
      @if (tab.badgeCount && tab.badgeCount() > 0) {
        <span [class]="'px-2 sm:px-3 py-0.5 sm:py-1 text-xs rounded-full border font-bold ' + tab.badgeColor">
          {{ tab.badgeCount() }}
        </span>
      }
    </a>
  }
</div>
}
