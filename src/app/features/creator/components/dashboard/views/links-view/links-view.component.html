<!-- Public Link Card -->
<div class="card p-5 sm:p-6 mb-6 border-accent/20">
  <div class="flex items-center gap-3 mb-4">
    <div class="w-9 h-9 rounded-lg bg-accent/10 flex items-center justify-center flex-shrink-0">
      <svg class="w-4 h-4 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
      </svg>
    </div>
    <div class="flex-1 min-w-0">
      <h3 class="text-base font-semibold text-content">Your Public Page</h3>
      <p class="text-xs text-content-tertiary">Share this link to receive messages, calls &amp; showcase your links</p>
    </div>
  </div>
  <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
    <input
      type="text"
      [value]="state.publicUrl()"
      readonly
      class="input flex-1 font-mono text-sm"
    />
    <button
      (click)="state.copyPublicUrl()"
      class="btn-primary btn-md flex items-center justify-center gap-2 whitespace-nowrap"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
      </svg>
      Copy Link
    </button>
  </div>
</div>

<!-- Edit Links Component -->
<app-edit-links [creatorId]="state.creator()?.id || ''" />
