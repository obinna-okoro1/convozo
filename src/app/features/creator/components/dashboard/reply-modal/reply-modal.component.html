<div class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 animate-fade-in">
  <div class="card max-w-2xl w-full shadow-2xl animate-scale-in max-h-[95vh] overflow-y-auto">
    <!-- Modal Header -->
    <div class="flex items-start justify-between p-5 sm:p-6 border-b border-separator">
      <div class="flex-1 min-w-0 pr-2">
        <h3 class="text-lg sm:text-xl font-bold text-content">Reply to Message</h3>
        <p class="text-sm text-content-secondary mt-1 truncate">{{ message()?.sender_name }} · <span class="text-content-tertiary">{{ message()?.sender_email }}</span></p>
      </div>
      <button
        (click)="close()"
        [disabled]="sendingReply()"
        class="btn-ghost btn-sm !p-2"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Original Message -->
    <div class="p-5 sm:p-6 bg-surface-elevated/50 border-b border-separator">
      <div class="text-xs font-semibold text-accent uppercase tracking-wider mb-2 flex items-center gap-2">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
        </svg>
        Original Message
      </div>
      <div class="text-sm text-content leading-relaxed bg-surface-raised p-4 rounded-xl border border-separator">
        {{ message()?.message_content }}
      </div>
    </div>

    <!-- Reply Form -->
    <div class="p-5 sm:p-6">
      <div class="flex items-center justify-between mb-3">
        <label class="form-label">Your Reply</label>
        <button
          (click)="openTemplatePicker()"
          class="text-sm text-accent hover:text-accent/80 font-semibold flex items-center gap-1.5 transition-colors duration-200"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
          </svg>
          Use Template
        </button>
      </div>
      <textarea
        [value]="replyContent()"
        (input)="replyContent.set(inputValue($event))"
        rows="8"
        class="input resize-none"
        placeholder="Type your thoughtful reply here..."
        [disabled]="sendingReply()"
      ></textarea>
      <div class="flex items-center justify-between mt-2">
        <p class="text-xs text-content-tertiary">
          {{ replyContent().length }} characters
        </p>
        @if (replyContent().length === 0) {
          <p class="text-xs text-system-red font-medium">Reply cannot be empty</p>
        }
      </div>
    </div>

    <!-- Modal Footer -->
    <div class="flex flex-col-reverse sm:flex-row justify-end gap-3 p-5 sm:p-6 border-t border-separator">
      <button
        (click)="close()"
        [disabled]="sendingReply()"
        class="btn-secondary btn-md"
      >Cancel</button>
      <button
        (click)="sendReply()"
        [disabled]="sendingReply() || !replyContent().trim()"
        class="btn-primary btn-md flex items-center justify-center gap-2"
      >
        @if (sendingReply()) {
          <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Sending…
        } @else {
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
          </svg>
          Send Reply
        }
      </button>
    </div>

    <!-- Template Picker Overlay -->
    @if (showTemplatePicker()) {
      <div class="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center rounded-2xl">
        <app-template-picker
          (templateSelected)="onTemplateSelected($event)"
          (closed)="showTemplatePicker.set(false)"
        />
      </div>
    }
  </div>
</div>
