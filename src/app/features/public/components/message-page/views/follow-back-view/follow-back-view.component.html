<!-- Back to profile -->
<a routerLink=".." class="inline-flex items-center gap-1.5 text-content-secondary hover:text-content text-sm font-medium mb-5 transition-colors duration-200 group">
  <svg class="w-4 h-4 group-hover:-translate-x-0.5 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
  </svg>
  Back to profile
</a>

@if (state.followBackEnabled()) {
  <app-message-form
    [priceCents]="state.followBackPriceCents()"
    [creatorName]="state.creator()?.display_name ?? ''"
    [submitting]="state.submitting()"
    productType="follow_back"
    (formSubmit)="onFollowBackSubmit($event)"
  />
} @else {
  <div class="card-glass p-8 text-center">
    <svg class="w-10 h-10 text-content-tertiary mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
    </svg>
    <p class="text-content-tertiary text-sm">Connection requests are not available for this professional</p>
  </div>
}
