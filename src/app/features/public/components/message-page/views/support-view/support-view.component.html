@if (state.tipsEnabled()) {
  <div class="bg-white/5 backdrop-blur-2xl border border-white/10 rounded-3xl p-8 shadow-2xl">
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Support Header -->
      <div class="mb-8 text-center">
        <div class="inline-block relative">
          <div
            class="absolute inset-0 bg-gradient-to-r from-pink-600 to-rose-600 rounded-3xl blur-2xl opacity-30 animate-pulse-slow"
          ></div>
          <div
            class="relative bg-gradient-to-br from-pink-600 to-rose-600 px-10 py-6 rounded-3xl shadow-2xl border border-pink-400/20"
          >
            <div class="text-sm text-pink-100 mb-2 font-medium uppercase tracking-wider">
              Support {{ state.creator()?.display_name }}
            </div>
            <div class="flex items-baseline justify-center gap-1">
              <span class="text-2xl font-bold text-white">❤️</span>
              <span class="text-pink-200 text-lg ml-2">Choose your amount</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Amount Presets -->
      <div>
        <label class="block text-sm font-semibold text-slate-200 mb-3 flex items-center gap-2">
          <svg class="w-4 h-4 text-pink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span>Amount</span>
          <span class="text-pink-400">*</span>
        </label>
        <div class="flex flex-wrap gap-3 mb-4">
          @for (amount of presetAmounts; track amount) {
            <button
              type="button"
              (click)="selectAmount(amount)"
              [class]="amountDollars === amount
                ? 'px-5 py-3 rounded-2xl font-bold text-white bg-gradient-to-r from-pink-600 to-rose-600 shadow-lg shadow-pink-500/30 scale-105 transition-all duration-300'
                : 'px-5 py-3 rounded-2xl font-bold text-white/70 bg-white/5 border border-white/10 hover:bg-white/10 transition-all duration-300'"
            >
              ${{ amount }}
            </button>
          }
        </div>
        <div class="flex items-center gap-4">
          <span class="text-3xl font-bold bg-gradient-to-r from-pink-400 to-rose-400 bg-clip-text text-transparent">$</span>
          <div class="relative flex-1 group">
            <input
              type="number"
              [(ngModel)]="amountDollars"
              name="amountDollars"
              min="1"
              step="1"
              required
              placeholder="Custom amount"
              class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all duration-300 backdrop-blur-sm hover:bg-white/10"
            />
          </div>
        </div>
        <p class="text-xs text-slate-500 mt-2">Minimum $1.00 USD</p>
      </div>

      <!-- Sender Info -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-semibold text-slate-200 mb-2 flex items-center gap-2">
            <svg class="w-4 h-4 text-pink-400" fill="currentColor" viewBox="0 0 20 20">
              <path
                fill-rule="evenodd"
                d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
                clip-rule="evenodd"
              />
            </svg>
            <span>Your Name</span>
            <span class="text-pink-400">*</span>
          </label>
          <input
            type="text"
            [(ngModel)]="senderName"
            name="senderName"
            placeholder="Enter your name"
            class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all duration-300 backdrop-blur-sm hover:bg-white/10"
            required
          />
        </div>
        <div>
          <label class="block text-sm font-semibold text-slate-200 mb-2 flex items-center gap-2">
            <svg class="w-4 h-4 text-pink-400" fill="currentColor" viewBox="0 0 20 20">
              <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
              <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
            </svg>
            <span>Your Email</span>
            <span class="text-pink-400">*</span>
          </label>
          <input
            type="email"
            [(ngModel)]="senderEmail"
            name="senderEmail"
            placeholder="you&#64;example.com"
            class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all duration-300 backdrop-blur-sm hover:bg-white/10"
            required
          />
        </div>
      </div>

      <!-- Instagram Handle -->
      <div>
        <label class="block text-sm font-semibold text-slate-200 mb-2 flex items-center gap-2">
          <svg class="w-4 h-4 text-pink-400" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"
            />
          </svg>
          <span>Instagram Handle</span>
          <span class="text-slate-500 text-xs font-normal">(optional)</span>
        </label>
        <div class="relative">
          <span
            class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 text-base font-medium"
            >&#64;</span
          >
          <input
            type="text"
            [(ngModel)]="senderInstagram"
            name="senderInstagram"
            placeholder="your_username"
            class="w-full pl-10 pr-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all duration-300 backdrop-blur-sm hover:bg-white/10"
          />
        </div>
      </div>

      <!-- Note (optional) -->
      <div>
        <label class="block text-sm font-semibold text-slate-200 mb-2 flex items-center gap-2">
          <svg class="w-4 h-4 text-pink-400" fill="currentColor" viewBox="0 0 20 20">
            <path
              fill-rule="evenodd"
              d="M18 13V5a2 2 0 00-2-2H4a2 2 0 00-2 2v8a2 2 0 002 2h3l3 3 3-3h3a2 2 0 002-2zM5 7a1 1 0 011-1h8a1 1 0 110 2H6a1 1 0 01-1-1zm1 3a1 1 0 100 2h3a1 1 0 100-2H6z"
              clip-rule="evenodd"
            />
          </svg>
          <span>Leave a Note</span>
          <span class="text-slate-500 text-xs font-normal">(optional)</span>
        </label>
        <textarea
          [(ngModel)]="messageContent"
          name="messageContent"
          placeholder="Say something nice..."
          rows="4"
          maxlength="500"
          class="w-full px-5 py-4 bg-white/5 border border-white/10 rounded-2xl text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-pink-500 focus:border-transparent transition-all duration-300 backdrop-blur-sm hover:bg-white/10 resize-none"
        ></textarea>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="state.submitting() || !senderName || !senderEmail || amountDollars < 1"
        class="w-full py-5 bg-gradient-to-r from-pink-600 to-rose-600 text-white font-bold text-lg rounded-2xl shadow-2xl shadow-pink-500/30 hover:shadow-pink-500/50 hover:scale-[1.02] transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100 flex items-center justify-center gap-3"
      >
        @if (state.submitting()) {
          <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>Processing...</span>
        } @else {
          <span>❤️</span>
          <span>Support with ${{ amountDollars }}</span>
        }
      </button>

      <!-- Trust Indicators -->
      <app-trust-indicators />
    </form>
  </div>
} @else {
  <div class="bg-white/5 backdrop-blur-2xl border border-white/10 rounded-3xl p-8 text-center">
    <svg class="w-12 h-12 text-slate-500 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
    </svg>
    <p class="text-slate-400 text-sm">Fan support is not available for this creator</p>
  </div>
}
