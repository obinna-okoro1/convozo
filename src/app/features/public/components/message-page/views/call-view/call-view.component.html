<!-- Back to profile -->
<a routerLink=".." class="inline-flex items-center gap-1.5 text-content-secondary hover:text-content text-sm font-medium mb-5 transition-colors duration-200 group">
  <svg class="w-4 h-4 group-hover:-translate-x-0.5 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
  </svg>
  Back to profile
</a>

@if (state.callsEnabled()) {
  <app-call-booking-form
    [priceCents]="state.callPriceCents()"
    [callDuration]="state.callDuration()"
    [creatorName]="state.creator()?.display_name ?? ''"
    [availabilitySlots]="state.availabilitySlots()"
    [submitting]="state.submitting()"
    (formSubmit)="onCallBookingSubmit($event)"
  />
} @else {
  <div class="card-glass p-8 text-center">
    <svg class="w-10 h-10 text-content-tertiary mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
    </svg>
    <p class="text-content-tertiary text-sm">Call bookings are not available for this professional</p>
  </div>
}
