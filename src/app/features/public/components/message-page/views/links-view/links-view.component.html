@if (state.creatorLinks().length > 0) {
  <app-link-list
    [links]="state.creatorLinks()"
    [themeColor]="null"
    (linkClicked)="onLinkClicked($event)"
  />
} @else {
  <div class="card p-8 text-center">
    <svg class="w-10 h-10 text-content-tertiary mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1" />
    </svg>
    <p class="text-content-tertiary text-sm">No links yet</p>
  </div>
}
