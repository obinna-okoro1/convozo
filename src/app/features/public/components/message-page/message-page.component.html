<div class="min-h-screen bg-surface relative overflow-hidden">

  <!-- Ambient blobs — brand colour wash that makes backdrop-filter visible on glass tabs, cards & buttons regardless of banner -->
  <div class="absolute inset-0 pointer-events-none" aria-hidden="true">
    <div style="position:absolute;top:-12rem;right:-6rem;width:40rem;height:40rem;background:radial-gradient(ellipse at 100% 0%,rgba(124,58,237,0.14) 0%,transparent 65%)"></div>
    <div style="position:absolute;top:28rem;left:-10rem;width:36rem;height:36rem;background:radial-gradient(ellipse at 0% 50%,rgba(236,72,153,0.11) 0%,transparent 65%)"></div>
    <div style="position:absolute;bottom:0;left:25%;width:32rem;height:32rem;background:radial-gradient(ellipse at 50% 100%,rgba(124,58,237,0.09) 0%,transparent 65%)"></div>
  </div>

  @if (state.loading()) {
    <!-- Loading -->
    <div class="flex items-center justify-center min-h-screen">
      <div class="text-center">
        <div class="w-12 h-12 rounded-xl bg-accent/10 flex items-center justify-center mx-auto mb-4">
          <svg class="animate-spin h-6 w-6 text-accent" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        </div>
        <p class="text-content-tertiary text-sm">Loading profile…</p>
      </div>
    </div>

  } @else if (state.error()) {
    <!-- Error -->
    <div class="flex items-center justify-center min-h-screen px-4">
      <div class="text-center max-w-xs">
        <div class="w-16 h-16 rounded-2xl bg-system-red/10 flex items-center justify-center mx-auto mb-6">
          <svg class="w-8 h-8 text-system-red" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <h2 class="text-2xl font-bold text-content mb-2 tracking-tight">Profile not found</h2>
        <p class="text-content-tertiary text-sm mb-6">This creator doesn't exist or is no longer active.</p>
        <a routerLink="/home" class="btn-primary btn-md inline-flex items-center gap-2">
          Explore Convozo
        </a>
      </div>
    </div>

  } @else {
    <!-- Main content -->
    <div class="relative z-10">

      <!-- Creator header -->
      @if (state.creator(); as creatorData) {
        <div class="animate-fade-in">
          <app-creator-profile-header
            [creator]="creatorData"
            [responseExpectation]="state.responseExpectation()"
          />
        </div>
      }

      <!-- Tabs + form -->
      <div class="max-w-xl mx-auto px-4 pb-16">
        <div class="animate-fade-in" style="animation-delay: 100ms">
          <app-message-page-tabs />
        </div>

        <div class="animate-fade-in" style="animation-delay: 200ms">
          <router-outlet />
        </div>

        <!-- Footer -->
        <div class="text-center mt-12">
          <a routerLink="/home" class="inline-flex items-center gap-1.5 text-xs text-content-tertiary hover:text-content-secondary transition-colors duration-200">
            <svg class="w-3.5 h-3.5" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs><linearGradient id="cvz-fp" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#ec4899"/></linearGradient></defs>
              <rect width="40" height="40" rx="8" fill="url(#cvz-fp)"/>
              <circle cx="20" cy="20" r="2.5" fill="white"/>
              <path d="M25 13 A8 8 0 1 0 25 27" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>
            </svg>
            <span>Powered by <strong class="font-semibold">Convozo</strong></span>
          </a>
        </div>
      </div>
    </div>
  }
</div>
