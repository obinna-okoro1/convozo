<div class="min-h-screen bg-[#060412] relative">

  <!-- Subtle ambient glow -->
  <div class="fixed inset-0 pointer-events-none z-0" aria-hidden="true">
    <div class="absolute top-0 inset-x-0 h-[30rem]" style="background:radial-gradient(ellipse at 50% -10%, rgba(124,58,237,0.28) 0%, transparent 65%)"></div>
  </div>

  @if (state.loading()) {
    <!-- ── Loading ── -->
    <div class="flex items-center justify-center min-h-screen relative z-10">
      <div class="text-center">
        <div class="relative w-20 h-20 mx-auto mb-5">
          <div class="absolute inset-0 rounded-full animate-ripple-out" style="background:rgba(124,58,237,0.25)"></div>
          <div class="absolute inset-0 rounded-full animate-ripple-out" style="background:rgba(124,58,237,0.15);animation-delay:0.7s"></div>
          <div class="relative w-full h-full rounded-full flex items-center justify-center shadow-xl shadow-purple-500/40"
               style="background:linear-gradient(135deg,#7c3aed,#ec4899)">
            <svg class="animate-spin h-8 w-8 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </div>
        </div>
        <p class="text-slate-500 text-sm font-medium tracking-wide">Loading profile…</p>
      </div>
    </div>

  } @else if (state.error()) {
    <!-- ── Error ── -->
    <div class="flex items-center justify-center min-h-screen px-4 relative z-10">
      <div class="text-center max-w-xs">
        <div class="w-20 h-20 rounded-[1.5rem] flex items-center justify-center mx-auto mb-6 shadow-lg"
             style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2)">
          <svg class="w-10 h-10 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
        </div>
        <h2 class="text-2xl font-black text-white mb-2 tracking-tight">Profile not found</h2>
        <p class="text-slate-500 text-sm mb-6">This creator doesn't exist or is no longer active.</p>
        <a routerLink="/home"
           class="inline-flex items-center gap-2 px-6 py-3 rounded-xl font-bold text-white text-sm hover:scale-[1.02] transition-all duration-200"
           style="background:linear-gradient(135deg,#7c3aed,#ec4899)">
          Explore Convozo
        </a>
      </div>
    </div>

  } @else {
    <!-- ── Main content ── -->
    <div class="relative z-10">

      <!-- Creator header — FULL BLEED (no container) -->
      @if (state.creator(); as creatorData) {
        <div class="animate-slide-blur-up">
          <app-creator-profile-header
            [creator]="creatorData"
            [responseExpectation]="state.responseExpectation()"
          />
        </div>
      }

      <!-- Tabs + form — contained -->
      <div class="max-w-xl mx-auto px-4 pb-16">

        <!-- Tabs -->
        <div class="animate-slide-blur-up delay-150">
          <app-message-page-tabs />
        </div>

        <!-- Routed view -->
        <div class="animate-slide-blur-up delay-300">
          <router-outlet />
        </div>

        <!-- Footer -->
        <div class="text-center mt-12">
          <a routerLink="/home" class="inline-flex items-center gap-1.5 text-xs text-slate-600 hover:text-slate-400 transition-colors duration-200">
            <svg class="w-3.5 h-3.5" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <defs><linearGradient id="cvz-fp" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#7c3aed"/><stop offset="1" stop-color="#ec4899"/></linearGradient></defs>
              <rect width="40" height="40" rx="8" fill="url(#cvz-fp)"/>
              <circle cx="20" cy="20" r="2.5" fill="white"/>
              <path d="M25 13 A8 8 0 1 0 25 27" stroke="white" stroke-width="3.5" stroke-linecap="round" fill="none"/>
            </svg>
            <span>Powered by <strong class="font-semibold">Convozo</strong></span>
          </a>
        </div>
      </div>
    </div>
  }
</div>
