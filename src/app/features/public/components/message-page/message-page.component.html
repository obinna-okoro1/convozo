<div class="min-h-screen bg-gradient-to-br from-slate-950 via-purple-950 to-slate-900 relative overflow-hidden">
  <!-- Animated background effects -->
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-0 -left-4 w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob"></div>
    <div class="absolute top-0 -right-4 w-96 h-96 bg-pink-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-2000"></div>
    <div class="absolute -bottom-8 left-20 w-96 h-96 bg-blue-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob animation-delay-4000"></div>
  </div>

  @if (state.loading()) {
    <div class="flex items-center justify-center min-h-screen relative z-10">
      <div class="text-center">
        <div class="relative inline-block">
          <svg class="animate-spin h-16 w-16 text-purple-400 mx-auto mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <div class="absolute inset-0 bg-purple-500 rounded-full filter blur-xl opacity-50 animate-pulse"></div>
        </div>
        <p class="text-slate-300 text-lg font-medium animate-pulse">Loading exclusive access...</p>
      </div>
    </div>
  } @else if (state.error()) {
    <div class="flex items-center justify-center min-h-screen px-4 relative z-10">
      <div class="text-center max-w-md">
        <div class="w-24 h-24 bg-gradient-to-br from-red-500 to-pink-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-2xl shadow-red-500/50">
          <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </div>
        <h2 class="text-3xl font-bold text-white mb-3">Creator Not Found</h2>
        <p class="text-slate-400 mb-6">This creator profile doesn't exist or is no longer active.</p>
        <a routerLink="/home" class="inline-flex items-center gap-2 px-8 py-4 bg-gradient-to-r from-purple-600 to-pink-600 text-white font-semibold rounded-xl hover:shadow-2xl hover:shadow-purple-500/50 transition-all duration-300 transform hover:scale-105">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
          </svg>
          Explore Creators
        </a>
      </div>
    </div>
  } @else {
    <div class="container mx-auto px-4 py-8 relative z-10">
      <div class="max-w-4xl mx-auto">

        <!-- Creator Profile Header -->
        @if (state.creator(); as creatorData) {
          <div class="mb-8 animate-slide-up">
            <app-creator-profile-header
              [creator]="creatorData"
              [responseExpectation]="state.responseExpectation()"
            />
          </div>
        }

        <!-- Tabs -->
        <app-message-page-tabs />

        <!-- Routed View Content -->
        <div class="animate-slide-up" style="animation-delay: 200ms;">
          <router-outlet />
        </div>

        <!-- Footer -->
        <div class="text-center mt-8 text-sm text-slate-400">
          <p>Powered by <a routerLink="/home" class="bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent font-semibold hover:from-purple-300 hover:to-pink-300 transition-all duration-300">Convozo</a></p>
        </div>
      </div>
    </div>
  }
</div>
