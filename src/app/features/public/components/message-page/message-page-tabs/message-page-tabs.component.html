@if (visibleTabs().length > 1) {
<div class="mb-6 animate-slide-up" style="animation-delay: 150ms;">
  <div class="relative bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-2 overflow-hidden">
    <!-- Left scroll fade -->
    <div
      class="absolute left-0 top-0 bottom-0 w-8 bg-gradient-to-r from-slate-950/80 to-transparent z-10 pointer-events-none transition-opacity duration-300"
      [class.opacity-0]="!canScrollLeft()"
    ></div>

    <!-- Scrollable tabs -->
    <div #scrollContainer (scroll)="onScroll()" class="flex gap-2 overflow-x-auto scrollbar-hide">
      @for (tab of visibleTabs(); track tab.path) {
        <a
          [routerLink]="tab.path"
          routerLinkActive
          #rla="routerLinkActive"
          [class]="rla.isActive
            ? 'flex-shrink-0 px-3 sm:px-6 py-3 sm:py-4 font-semibold text-xs sm:text-sm rounded-2xl transition-all duration-300 flex items-center justify-center gap-1.5 sm:gap-2 whitespace-nowrap bg-gradient-to-r from-purple-600 to-pink-600 text-white shadow-lg shadow-purple-500/50'
            : 'flex-shrink-0 px-3 sm:px-6 py-3 sm:py-4 font-semibold text-xs sm:text-sm rounded-2xl transition-all duration-300 flex items-center justify-center gap-1.5 sm:gap-2 whitespace-nowrap text-slate-400 hover:text-white'"
        >
          <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="tab.iconPath" />
          </svg>
          <span>{{ tab.label }}</span>
        </a>
      }
    </div>

    <!-- Right scroll fade -->
    <div
      class="absolute right-0 top-0 bottom-0 w-8 bg-gradient-to-l from-slate-950/80 to-transparent z-10 pointer-events-none transition-opacity duration-300"
      [class.opacity-0]="!canScrollRight()"
    ></div>
  </div>
</div>
}
