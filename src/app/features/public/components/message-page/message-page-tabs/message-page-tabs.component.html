@if (visibleTabs().length > 1) {
  <nav class="mb-5" aria-label="Profile sections">
    <div class="flex gap-1 p-1.5 rounded-2xl glass-panel">
      @for (tab of visibleTabs(); track tab.path) {
        <a
          [routerLink]="tab.path"
          routerLinkActive
          #rla="routerLinkActive"
          [routerLinkActiveOptions]="tab.exact ? { exact: true } : { exact: false }"
          class="flex-1 flex items-center justify-center gap-1.5 py-2.5 px-2 rounded-xl text-xs sm:text-sm font-bold transition-all duration-300 whitespace-nowrap relative overflow-hidden"
          [class]="rla.isActive
            ? 'text-white shadow-lg'
            : 'text-content-secondary hover:text-content hover:bg-white/20 hover:backdrop-blur-sm'"
          [style]="rla.isActive ? 'background:linear-gradient(135deg,rgba(124,58,237,0.82),rgba(147,51,234,0.82),rgba(236,72,153,0.82));backdrop-filter:saturate(200%) blur(1rem);-webkit-backdrop-filter:saturate(200%) blur(1rem);border:1px solid rgba(255,255,255,0.28);box-shadow:0 0.25rem 1rem rgba(124,58,237,0.32),inset 0 1px 0 rgba(255,255,255,0.22)' : ''"
        >
          <!-- Shine on active -->
          @if (rla.isActive) {
            <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent animate-shine-sweep pointer-events-none"></div>
          }
          <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="tab.iconPath"/>
          </svg>
          <span class="hidden sm:inline">{{ tab.label }}</span>
          <!-- Mobile: abbreviated -->
          <span class="sm:hidden">{{ tab.label.split(' ')[0] }}</span>
        </a>
      }
    </div>
  </nav>
}
