@if (visibleTabs().length > 1) {
<div class="mb-6 animate-slide-up overflow-hidden" style="animation-delay: 150ms;">
  <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-2 flex gap-2">
    @for (tab of visibleTabs(); track tab.path) {
      <a
        [routerLink]="tab.path"
        routerLinkActive
        #rla="routerLinkActive"
        [class]="rla.isActive
          ? 'flex-1 px-3 sm:px-6 py-3 sm:py-4 font-semibold text-xs sm:text-sm rounded-2xl transition-all duration-300 flex items-center justify-center gap-1.5 sm:gap-2 bg-gradient-to-r from-purple-600 to-pink-600 text-white shadow-lg shadow-purple-500/50'
          : 'flex-1 px-3 sm:px-6 py-3 sm:py-4 font-semibold text-xs sm:text-sm rounded-2xl transition-all duration-300 flex items-center justify-center gap-1.5 sm:gap-2 text-slate-400 hover:text-white'"
      >
        <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="tab.iconPath" />
        </svg>
        <span>{{ tab.label }}</span>
      </a>
    }
  </div>
</div>
}
