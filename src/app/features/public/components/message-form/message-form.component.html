<!-- Apple-style message form -->
<div class="card-glass overflow-hidden animate-fade-in">

  <!-- ── Price hero ── -->
  <div class="px-8 pt-8 pb-6 text-center border-b border-separator">
    <p class="text-xs font-semibold text-accent uppercase tracking-widest mb-3">{{ productLabel() }}</p>
    <div class="flex items-start justify-center gap-1 mb-2">
      <span class="text-2xl font-bold text-content-muted mt-2">$</span>
      <span class="text-7xl font-black text-content leading-none tracking-tight">{{ priceInDollars() }}</span>
      @if (!isFollowBack()) {
        <span class="text-sm text-content-muted self-end mb-2 ml-1">{{ priceUnit() }}</span>
      }
    </div>
    @if (!isFollowBack()) {
      <div class="flex items-center justify-center gap-1.5 text-content-muted text-xs">
        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/>
        </svg>
        Response within {{ responseExpectation() }}
      </div>
    }
  </div>

  <!-- ── Form fields ── -->
  <form (ngSubmit)="onSubmit()" class="px-6 pb-6 pt-5 space-y-4">

    <!-- Name + Email row -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label for="senderName" class="form-label">Your Name <span class="text-red-400">*</span></label>
        <input
          id="senderName"
          type="text"
          [(ngModel)]="senderName"
          name="senderName"
          placeholder="Enter your name"
          class="input"
          required
        />
      </div>
      <div>
        <label for="senderEmail" class="form-label">Email <span class="text-red-400">*</span></label>
        <input
          id="senderEmail"
          type="email"
          [(ngModel)]="senderEmail"
          name="senderEmail"
          placeholder="you&#64;example.com"
          class="input"
          required
        />
      </div>
    </div>

    <!-- Instagram (optional) -->
    <div>
      <label for="senderInstagram" class="form-label">
        Instagram <span class="text-content-muted font-normal">(optional)</span>
      </label>
      <div class="flex items-center gap-2">
        <span class="text-accent text-lg font-semibold">&#64;</span>
        <input
          type="text"
          id="senderInstagram"
          [(ngModel)]="senderInstagram"
          name="senderInstagram"
          placeholder="your_username"
          class="input flex-1"
        />
      </div>
    </div>

    <!-- Message textarea -->
    <div>
      <label for="messageContent" class="form-label">{{ messageLabel() }} <span class="text-red-400">*</span></label>
      <textarea
        id="messageContent"
        [(ngModel)]="messageContent"
        name="messageContent"
        [placeholder]="messagePlaceholder()"
        rows="5"
        maxlength="1000"
        class="input resize-none"
        required
      ></textarea>
      <div class="flex justify-between items-center mt-1.5">
        <span class="text-xs text-content-muted flex items-center gap-1.5">
          <svg class="w-3 h-3 text-[#1a9e3f]" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
          </svg>
          {{ inboxNote() }}
        </span>
        <span class="text-xs font-medium" [class.text-red-400]="charCount() > 900" [class.text-content-muted]="charCount() <= 900">
          {{ charCount() }}/1000
        </span>
      </div>
    </div>

    <!-- Submit CTA -->
    <button
      type="submit"
      [disabled]="submitting()"
      class="btn-glass-primary btn-lg w-full flex items-center justify-center gap-2.5"
    >
      @if (submitting()) {
        <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>Processing payment…</span>
      } @else {
        <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
        </svg>
        <span>{{ submitLabel() }}</span>
      }
    </button>

    <app-trust-indicators />
  </form>
</div>
