<!-- Premium message form -->
<div class="rounded-3xl overflow-hidden shadow-2xl shadow-purple-900/30" style="background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07)">

  <!-- ── Price hero ── -->
  <div class="relative px-8 pt-8 pb-6 text-center overflow-hidden">
    <!-- Background gradient -->
    <div class="absolute inset-0" style="background:linear-gradient(135deg, rgba(124,58,237,0.18) 0%, rgba(236,72,153,0.1) 100%)"></div>
    <!-- Glow dot -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 rounded-full blur-3xl animate-glow-breathe" style="background:rgba(124,58,237,0.4)"></div>

    <div class="relative">
      <p class="text-xs font-bold text-purple-300 uppercase tracking-[0.2em] mb-3">{{ productLabel() }}</p>
      <div class="flex items-start justify-center gap-1 mb-2">
        <span class="text-2xl font-bold text-slate-400 mt-2">$</span>
        <span class="text-7xl font-black text-white leading-none tracking-tight">{{ priceInDollars() }}</span>
        @if (!isFollowBack()) {
          <span class="text-sm text-slate-500 self-end mb-2 ml-1">{{ priceUnit() }}</span>
        }
      </div>
      @if (!isFollowBack()) {
        <div class="flex items-center justify-center gap-1.5 text-purple-300 text-xs">
          <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" clip-rule="evenodd"/>
          </svg>
          Response within {{ responseExpectation() }}
        </div>
      }
    </div>
  </div>

  <!-- ── Form fields ── -->
  <form (ngSubmit)="onSubmit()" class="px-6 pb-6 pt-4 space-y-4">

    <!-- Name + Email row -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div class="space-y-1.5">
        <label for="senderName" class="block text-xs font-bold text-slate-400 uppercase tracking-wider">
          Your Name <span class="text-pink-400">*</span>
        </label>
        <input
          id="senderName"
          type="text"
          [(ngModel)]="senderName"
          name="senderName"
          placeholder="Enter your name"
          class="w-full px-4 py-3.5 rounded-2xl text-white text-sm placeholder-slate-600 outline-none transition-all duration-200"
          style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08)"
          required
        />
      </div>
      <div class="space-y-1.5">
        <label for="senderEmail" class="block text-xs font-bold text-slate-400 uppercase tracking-wider">
          Email <span class="text-pink-400">*</span>
        </label>
        <input
          id="senderEmail"
          type="email"
          [(ngModel)]="senderEmail"
          name="senderEmail"
          placeholder="you&#64;example.com"
          class="w-full px-4 py-3.5 rounded-2xl text-white text-sm placeholder-slate-600 outline-none transition-all duration-200"
          style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08)"
          required
        />
      </div>
    </div>

    <!-- Instagram (optional) -->
    <div class="space-y-1.5">
      <label for="senderInstagram" class="flex items-center gap-1.5 text-xs font-bold text-slate-400 uppercase tracking-wider">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
        </svg>
        Instagram <span class="text-slate-600 font-normal normal-case">(optional)</span>
      </label>
      <div class="relative">
        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm font-medium select-none">&#64;</span>
        <input
          type="text"
          id="senderInstagram"
          [(ngModel)]="senderInstagram"
          name="senderInstagram"
          placeholder="your_username"
          class="w-full pl-9 pr-4 py-3.5 rounded-2xl text-white text-sm placeholder-slate-600 outline-none transition-all duration-200"
          style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08)"
        />
      </div>
    </div>

    <!-- Message textarea -->
    <div class="space-y-1.5">
      <label for="messageContent" class="block text-xs font-bold text-slate-400 uppercase tracking-wider">
        {{ messageLabel() }} <span class="text-pink-400">*</span>
      </label>
      <textarea
        id="messageContent"
        [(ngModel)]="messageContent"
        name="messageContent"
        [placeholder]="messagePlaceholder()"
        rows="5"
        maxlength="1000"
        class="w-full px-4 py-3.5 rounded-2xl text-white text-sm placeholder-slate-600 outline-none transition-all duration-200 resize-none"
        style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08)"
        required
      ></textarea>
      <div class="flex justify-between items-center">
        <span class="text-xs text-slate-600 flex items-center gap-1.5">
          <svg class="w-3 h-3 text-emerald-500" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
          </svg>
          {{ inboxNote() }}
        </span>
        <span class="text-xs font-medium" [class.text-pink-400]="charCount() > 900" [class.text-slate-600]="charCount() <= 900">
          {{ charCount() }}/1000
        </span>
      </div>
    </div>

    <!-- Submit CTA -->
    <button
      type="submit"
      [disabled]="submitting()"
      class="group relative w-full overflow-hidden rounded-2xl font-black text-white text-base py-4 shadow-xl transition-all duration-300 disabled:opacity-60 disabled:cursor-not-allowed hover:scale-[1.01] hover:shadow-purple-500/40"
      style="background:linear-gradient(135deg,#7c3aed 0%,#9333ea 50%,#ec4899 100%);box-shadow:0 0.5rem 1.5rem rgba(124,58,237,0.3)"
    >
      <!-- Shine sweep on hover -->
      <div class="absolute inset-0 bg-gradient-to-r from-transparent via-white/15 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700 pointer-events-none"></div>

      <div class="relative flex items-center justify-center gap-2.5">
        @if (submitting()) {
          <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>Processing payment…</span>
        } @else {
          <svg class="w-5 h-5 group-hover:scale-110 transition-transform flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <span>{{ submitLabel() }}</span>
          <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
        }
      </div>
    </button>

    <app-trust-indicators />
  </form>
</div>
