<a
  [href]="link().url"
  target="_blank"
  rel="noopener noreferrer"
  (click)="onLinkClick($event)"
  class="group flex items-center gap-3 w-full px-6 py-4 rounded-2xl border backdrop-blur-xl transition-all duration-300 active:scale-[0.98] sm:hover:scale-[1.02]"
  [style.background]="'rgba(255,255,255,0.05)'"
  [style.border-color]="(themeColor() || '#7c3aed') + '30'"
>
  <!-- Brand icon or generic globe -->
  <div
    class="w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 shadow-lg transition-transform duration-300 group-hover:scale-110"
    [style.background]="brandInfo ? brandInfo.color + '20' : (themeColor() || '#7c3aed') + '20'"
  >
    @if (brandInfo) {
      <svg class="w-5 h-5" viewBox="0 0 24 24" [style.fill]="brandInfo.color">
        <path [attr.d]="brandInfo.svgPath" />
      </svg>
    } @else {
      <svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"
        />
      </svg>
    }
  </div>

  <!-- Title -->
  <span class="flex-1 text-white font-semibold text-base truncate">{{ link().title }}</span>

  <!-- Arrow -->
  <svg
    class="w-4 h-4 text-slate-500 group-hover:text-white transition-colors flex-shrink-0"
    fill="none"
    stroke="currentColor"
    viewBox="0 0 24 24"
  >
    <path
      stroke-linecap="round"
      stroke-linejoin="round"
      stroke-width="2"
      d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"
    />
  </svg>
</a>
