<!-- Modal backdrop -->
<button
  type="button"
  class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40"
  (click)="closeModal()"
  aria-label="Close modal"
></button>

<!-- Modal container -->
<div class="fixed inset-0 flex items-center justify-center z-50 p-4 sm:p-6" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="card max-w-md w-full overflow-hidden animate-scale-in shadow-2xl">
    <!-- Header -->
    <div class="flex items-center justify-between p-5 sm:p-6 border-b border-separator">
      <h2 class="text-lg font-bold text-content" id="modal-title">
        {{ editingLink() ? 'Edit Link' : 'Add New Link' }}
      </h2>
      <button
        type="button"
        (click)="closeModal()"
        class="btn-ghost btn-sm !p-1.5"
        title="Close"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <!-- Form -->
    <div class="p-5 sm:p-6 space-y-4">
      <div>
        <label for="link-url" class="form-label">Link URL</label>
        <input
          id="link-url"
          type="url"
          [(ngModel)]="formUrl"
          (ngModelChange)="onUrlChange($event)"
          placeholder="https://youtube.com/your-channel"
          class="input"
        />
        @if (detectedBrand()) {
          <div class="flex items-center gap-2 mt-2 text-xs">
            <svg class="w-4 h-4" viewBox="0 0 24 24" [style.fill]="detectedBrand()!.color">
              <path [attr.d]="detectedBrand()!.svgPath" />
            </svg>
            <span class="text-content-tertiary">Detected:
              <span class="font-medium" [style.color]="detectedBrand()!.color">{{ detectedBrand()!.label }}</span>
            </span>
          </div>
        }
      </div>

      <div>
        <label for="link-title" class="form-label">Link Title</label>
        <input
          id="link-title"
          type="text"
          [(ngModel)]="formTitle"
          placeholder="e.g. My YouTube Channel"
          class="input"
        />
      </div>
    </div>

    <!-- Footer -->
    <div class="flex gap-3 p-5 sm:p-6 border-t border-separator">
      <button
        (click)="closeModal()"
        class="btn-secondary btn-md flex-1"
      >Cancel</button>
      <button
        (click)="saveLink()"
        [disabled]="saving() || !formTitle.trim() || !formUrl.trim()"
        class="btn-primary btn-md flex-1"
      >
        @if (saving()) {
          <span class="flex items-center justify-center gap-2">
            <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            Saving…
          </span>
        } @else {
          {{ editingLink() ? 'Update Link' : 'Add Link' }}
        }
      </button>
    </div>
  </div>
</div>
