<!-- Link Form Modal Component -->
<!-- Handles adding/editing links in a modal overlay -->

<!-- Modal backdrop -->
<button
  type="button"
  class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40"
  (click)="closeModal()"
  aria-label="Close modal"
></button>

<!-- Modal container -->
<div class="fixed inset-0 flex items-center justify-center z-50 p-4 sm:p-6" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div
    class="bg-slate-900 border border-white/10 rounded-2xl shadow-2xl max-w-md w-full overflow-hidden animate-in fade-in zoom-in-95"
  >
    <!-- Header -->
    <div class="flex items-center justify-between p-6 border-b border-white/10">
      <h2 class="text-lg font-bold text-white" id="modal-title">
        {{ editingLink() ? 'Edit Link' : 'Add New Link' }}
      </h2>
      <button
        type="button"
        (click)="closeModal()"
        class="p-1 text-slate-400 hover:text-white transition-colors"
        title="Close"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>

    <!-- Form -->
    <div class="p-6 space-y-4">
      <!-- URL input -->
      <div>
        <label for="link-url" class="block text-sm font-medium text-slate-300 mb-2"> Link URL </label>
        <input
          id="link-url"
          type="url"
          [(ngModel)]="formUrl"
          (ngModelChange)="onUrlChange($event)"
          placeholder="https://youtube.com/your-channel"
          class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 text-sm focus:outline-none focus:border-purple-500/50 focus:ring-1 focus:ring-purple-500/30 transition-all"
        />
        <!-- Brand detection indicator -->
        @if (detectedBrand()) {
          <div class="flex items-center gap-2 mt-2 text-xs">
            <svg class="w-4 h-4" viewBox="0 0 24 24" [style.fill]="detectedBrand()!.color">
              <path [attr.d]="detectedBrand()!.svgPath" />
            </svg>
            <span class="text-slate-400"
              >Detected:
              <span class="font-medium" [style.color]="detectedBrand()!.color">{{
                detectedBrand()!.label
              }}</span></span
            >
          </div>
        }
      </div>

      <!-- Title input -->
      <div>
        <label for="link-title" class="block text-sm font-medium text-slate-300 mb-2"> Link Title </label>
        <input
          id="link-title"
          type="text"
          [(ngModel)]="formTitle"
          placeholder="e.g. My YouTube Channel"
          class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 text-sm focus:outline-none focus:border-purple-500/50 focus:ring-1 focus:ring-purple-500/30 transition-all"
        />
      </div>
    </div>

    <!-- Footer -->
    <div class="flex gap-3 p-6 border-t border-white/10">
      <button
        (click)="closeModal()"
        class="flex-1 px-4 py-3 bg-white/5 border border-white/10 text-slate-300 font-medium text-sm rounded-xl transition-all duration-300 active:scale-95 hover:bg-white/10"
      >
        Cancel
      </button>
      <button
        (click)="saveLink()"
        [disabled]="saving() || !formTitle.trim() || !formUrl.trim()"
        class="flex-1 px-4 py-3 bg-gradient-to-r from-purple-600 to-pink-600 text-white font-semibold text-sm rounded-xl transition-all duration-300 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed sm:hover:shadow-lg sm:hover:shadow-purple-500/30"
      >
        @if (saving()) {
          <span class="flex items-center justify-center gap-2">
            <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
              <circle
                class="opacity-25"
                cx="12"
                cy="12"
                r="10"
                stroke="currentColor"
                stroke-width="4"
              ></circle>
              <path
                class="opacity-75"
                fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"
              ></path>
            </svg>
            Saving...
          </span>
        } @else {
          {{ editingLink() ? 'Update Link' : 'Add Link' }}
        }
      </button>
    </div>
  </div>
</div>
