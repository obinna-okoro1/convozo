<div class="flex flex-col gap-3 w-full">
  @for (link of links(); track link.id) {
    <app-link-button
      [link]="link"
      [themeColor]="themeColor()"
      (clicked)="linkClicked.emit($event)"
    />
  } @empty {
    <div class="text-center py-8">
      <p class="text-slate-500 text-sm">No links yet</p>
    </div>
  }
</div>
