      border-radius: 1rem;
      padding: 1.5rem;
      backdrop-filter: blur(10px);
    }

    .preview-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #000;
      border-radius: 0.5rem;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .card h3 {
      margin-bottom: 1rem;
      font-size: 1.25rem;
    }

    .downloads {

      gap: 0.5rem;
      flex-wrap: wrap;
    }

    button {

      padding: 0.75rem 1rem;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;

    }

    .btn-png {

      color: #fff;
    }

    .btn-png:hover {

    }

      border-color: rgba(255, 255, 255, 0.3);
    }

    @media (max-width: 768px) {

      }
      .gallery {

  <script>
    function getSVGElement(postId) {
      const svgMap = {
        'post1': document.querySelectorAll('svg')[0],
        'post2': document.querySelectorAll('svg')[1],
        'post3': document.querySelectorAll('svg')[2],
        'post4': document.querySelectorAll('svg')[3],
        'post5': document.querySelectorAll('svg')[4],
        'post6': document.querySelectorAll('svg')[5],
      };
      return svgMap[postId];
    }

    function downloadPNG(postId) {
      const svg = getSVGElement(postId);
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      
      canvas.width = 1080;
      canvas.height = 1080;
      
      const svgString = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([svgString], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const img = new Image();
      
      img.onload = () => {
        ctx.drawImage(img, 0, 0);
        URL.revokeObjectURL(url);
        
        canvas.toBlob(blob => {
          const downloadUrl = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = downloadUrl;
          a.download = `convozo-${postId}.png`;
          a.click();
          URL.revokeObjectURL(downloadUrl);
        }, 'image/png');
      };
      
      img.src = url;
    }

    function downloadSVG(postId) {
      const svg = getSVGElement(postId);
      const svgString = new XMLSerializer().serializeToString(svg);
      const blob = new Blob([svgString], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `convozo-${postId}.svg`;
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
