name: CI

# Runs on every PR targeting develop or main, and on every push to those branches.
# A failing check blocks the PR from being merged (enforce via GitHub branch protection rules).

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx ng test --watch=false --browsers=ChromeHeadlessCI

      - name: Build (production)
        run: npm run build -- --configuration=production
