# deploy-main.yml
# Runs on every push to `main` (i.e. when a PR from develop is merged).
# Builds with the PRODUCTION environment and deploys to convozo.com.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — CF token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — Your Cloudflare account ID
#
# Supabase production values are baked into environment.prod.ts (they're public
# anon keys — not secrets). The sensitive Supabase edge function secrets are
# managed separately via `supabase secrets set` (not touched by this workflow).

name: Deploy → Production (main)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/convozo-app/browser --project-name=convozo --branch=main
