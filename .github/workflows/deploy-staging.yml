name: Deploy Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx ng test --watch=false --browsers=ChromeHeadlessCI

      - name: Build (staging)
        run: npm run build -- --configuration=staging

      - name: Deploy frontend to Cloudflare Pages (develop)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/convozo-app/browser --project-name=convozo --branch=develop

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply database migrations (staging)
        # Direct DB (db.PROJECT.supabase.co) is IPv6-only — unreachable from GitHub Actions.
        # Session pooler requires Supavisor to be enabled in the Supabase dashboard:
        #   Project Settings → Database → Connection Pooling → Enable
        # Until then, run `supabase db push --linked` locally before deploying.
        run: |
          supabase link --project-ref fzltvpbyhnvviuzanyha
          supabase db push --db-url "postgresql://postgres.fzltvpbyhnvviuzanyha:${{ secrets.STAGING_DB_PASSWORD }}@aws-0-eu-central-1.pooler.supabase.com:5432/postgres" --yes
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy Supabase Edge Functions (staging)
        run: supabase functions deploy --project-ref fzltvpbyhnvviuzanyha
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
