# deploy-develop.yml
# Runs on every push to `develop`.
# Builds with the STAGING environment (staging Supabase project + Flutterwave TEST keys)
# and deploys to the convozo-staging Cloudflare Pages project.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN      — CF token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID     — Your Cloudflare account ID

name: Deploy → Staging (develop)

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (staging)
        run: npm run build -- --configuration=staging

      - name: Deploy to Cloudflare Pages (staging)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/convozo-app/browser --project-name=convozo-staging --branch=develop
